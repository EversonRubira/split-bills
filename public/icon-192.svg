      <stop offset="0%" style="stop-color:#e8f0fe"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Recibo -->
  <rect x="36" y="40" width="56" height="72" rx="8" fill="#fbbf24"/>
  <rect x="44" y="52" width="40" height="8" rx="3" fill="white"/>
  <rect x="44" y="66" width="32" height="5" rx="2" fill="white" opacity="0.7"/>
  <rect x="44" y="76" width="28" height="5" rx="2" fill="white" opacity="0.7"/>
  <rect x="44" y="86" width="32" height="5" rx="2" fill="white" opacity="0.7"/>

  <!-- Barras do gráfico -->
  <rect x="76" y="100" width="18" height="36" rx="4" fill="#f97316"/>
  <rect x="100" y="80" width="18" height="56" rx="4" fill="#f97316"/>
  <rect x="124" y="60" width="18" height="76" rx="4" fill="#f97316"/>

  <!-- Moeda -->
  <circle cx="138" cy="58" r="22" fill="#fbbf24" stroke="white" stroke-width="4"/>
  <text x="138" y="65" font-family="serif" font-size="22" text-anchor="middle" fill="white" font-weight="bold">$</text>

  <!-- Linha base -->
